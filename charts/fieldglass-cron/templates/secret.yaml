apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fieldglass-cron.fullname" . }}-secret
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "fieldglass-cron.labels" . | nindent 4 }}
type: Opaque
stringData:
  CRON_SECRET: {{ .Values.cronjob.cronSecret | quote }}